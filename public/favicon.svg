<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      .line { fill: none; stroke: #2d2d2d; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .heart-filled { fill: #d0b27a; stroke: #2d2d2d; stroke-width: 6; stroke-linejoin: round; }
    </style>
  </defs>
  
  <!-- Tattoo Pen -->
  <g transform="translate(-5, -5) rotate(35 50 50)">
    <!-- Pen body -->
    <rect class="line" x="40" y="20" width="20" height="40" rx="3" />
    <!-- Grip lines -->
    <line class="line" x1="40" y1="30" x2="60" y2="30" />
    <line class="line" x1="40" y1="40" x2="60" y2="40" />
    <line class="line" x1="40" y1="50" x2="60" y2="50" />
    
    <!-- Motor / top -->
    <rect class="line" x="35" y="10" width="30" height="10" rx="2" />
    <path class="line" d="M 45 10 L 45 5 L 55 5 L 55 10" />

    <!-- Tip -->
    <polygon class="line" points="40,60 60,60 55,75 45,75" />
    <!-- Needle -->
    <line class="line" x1="50" y1="75" x2="50" y2="85" stroke-width="3" />
  </g>

  <!-- Boho Heart overlayed at bottom right -->
  <g transform="translate(38, 48) scale(0.6)">
    <path class="heart-filled" d="M 50 30 A 20 20 0 0 1 90 30 C 90 60 50 85 50 95 C 50 85 10 60 10 30 A 20 20 0 0 1 50 30 Z" />
  </g>
</svg>
